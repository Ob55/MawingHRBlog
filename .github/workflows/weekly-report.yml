name: Weekly report

# Emails a weekly website + blog summary to the Mawingu HR admin (no dashboard).
on:
  schedule:
    # Mondays at 07:00 UTC (10:00 EAT).
    - cron: '0 7 * * 1'
  # Lets you send a report on demand from the Actions tab ("Run workflow").
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send the weekly report email
        env:
          SITE_STATS_URL: ${{ secrets.SITE_STATS_URL }}
          STATS_TOKEN: ${{ secrets.STATS_TOKEN }}
          REPORT_EMAIL_TO: ${{ secrets.REPORT_EMAIL_TO }}
          BLOG_POSTS_URL: ${{ secrets.BLOG_POSTS_URL }}
          MAIL_HOST: ${{ secrets.MAIL_HOST }}
          MAIL_PORT: ${{ secrets.MAIL_PORT }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_FROM_ADDRESS: ${{ secrets.MAIL_FROM_ADDRESS }}
          MAIL_FROM_NAME: ${{ secrets.MAIL_FROM_NAME }}
        run: node automation/weekly-report.js
